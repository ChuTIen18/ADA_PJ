<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>CMS Simulation Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div id="control-panel">
      <h2>Demo CMS</h2>
      <div class="source-group">
        <button id="btnSynthetic" class="source-btn active">
          Data Giả lập
        </button>
        <button id="btnReal" class="source-btn">Data Thực tế</button>
      </div>
      <div id="modeNotification" class="notification-box">Đang xem : Data giả lập</div>

      <div id="inputsContainer" class="input-section">
        <label>Số Elephant:</label><input type="number" id="nHot" value="5" />
        <label>Số Mice:</label><input type="number" id="nCold" value="9995" />
      </div>

      <button id="runBtn">Chạy Simulation</button>
    </div>

    <div id="result-area">
      <h2>Kết quả So sánh</h2>
      <div class="chart-container"><canvas id="myChart"></canvas></div>
      <table id="top10Table">
        <thead>
          <tr>
            <th>IP</th>
            <th>True Count</th>
            <th>Classic Estimate</th>
            <th>Mixed Estimate</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
